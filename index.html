let s2 = [

"冷露凝荒草凄风送远鸿","闲庭花落尽深院鸟声稀","野塘秋水静古渡夕阳迟","江月随人远溪云伴客闲",
"竹影侵窗冷松声入户寒","乱山横晚色孤水带秋声","凉月生秋浦清风满竹扉","秋入孤村晚霜侵野径寒",
"水阔山光远天寒木叶疏","寒波淡淡起白鸟悠悠下","冷烟迷古渡残雪覆荒桥","断壁苔痕古疏林月色寒",
"孤亭临野水独树老秋山","山静凝云影溪清落月痕","夕照沉平野寒烟锁远村","幽涧泉声细闲庭树影疏",
"孤村流水暮远寺晚钟寒","浅滩留落雁寒渚起秋风","长天流素月远水送孤鸿","雾沉山影暗风定水声幽",
"孤灯照寒雨落叶满空山","荷笠带斜阳青山独归远","古木无人径深山何处钟","寒灯思旧事断雁警愁眠",
"风软一江水云轻九子山","平芜尽处是春山行人更在春山外","孤舟微月对枫林分付鸣筝与客心",

"古寺无僧花落尽空山有月鹤归来","云敛天高秋色远江清月白夜声稀","一枕新凉风送晚半窗残月夜生愁",

"云卷云舒山自在花开花落水无言","风定池荷静雨余庭草香","淡月疏星寒夜色残花弱柳暮秋天",
"衰柳寒烟秋色老残荷冷雨夕阳迟","小窗风定落花静深院月斜啼鸟稀","江涵秋影雁初飞与客携壶上翠微",

"独立小桥风满袖平林新月人归后","泪眼问花花不语乱红飞过秋千去","二十四桥明月夜玉人何处教吹箫",
"无情最是台城柳依旧烟笼十里堤","隔帘风絮乱绕院晚莺幽","残雪凝辉冷画屏落梅横笛已三更",
"风絮飘残已化萍泥莲刚倩藕丝萦","烟波千里路回首一销魂","雁尽书难寄愁多梦不成"

let str, len, now, que;
let ma = new Set(), myma = new Set();
let v = [];
let book = Array(105).fill(false);
let rod, flag, step;
let state = "menu";

function log(text) {
    document.getElementById("output").textContent += text + "\n";
    window.scrollTo(0, document.body.scrollHeight);
}

function getRand(opt) {
    let x;
    while(1) {
        x = Math.floor(Math.random() * 94) + 1;
        if(!book[x]) { book[x] = true; break; }
    }
    str = opt == 1 ? s1[x] : s2[x];
    len = str.length;
}

function prework(opt) {
    book.fill(false);
    getRand(opt);
    ma.clear(); myma.clear(); v = []; now = "";
    for(let i=0; i<len; i++) now += "？";
    for(let i=0; i<str.length; i++) ma.add(str[i]);
}

function check() {
    myma.clear(); v = [];
    for(let c of que) if(ma.has(c) && !myma.has(c)) { v.push(c); myma.add(c); }
    let tmp = now.split('');
    for(let i=0; i<str.length; i++) {
        if(i < que.length && str[i] == que[i]) tmp[i] = str[i];
    }
    now = tmp.join('');
}

function printNow() {
    log("当前已确认：" + v.join(" "));
    log("当前已填入：" + now + "\n");
}

function send() {
    let ipt = document.getElementById("input").value.trim();
    document.getElementById("input").value = "";
    log("> " + ipt);

    if(state == "menu") {
        if(ipt == "2") { log("再见喵"); state = "end"; return; }
        if(ipt == "1") {
            log("选择古诗范围：课内请按 1 , 课外请按 2");
            state = "chooseType";
        }
    } else if(state == "chooseType") {
        prework(+ipt);
        log("已知诗句有"+len+"个字");
        printNow();
        log("输入你想拥有的询问次数（无限则输入0）");
        state = "setRod";
    } else if(state == "setRod") {
        rod = +ipt; if(rod == 0) rod = 1e9;
        log("如果猜测途中想放弃则输入0");
        log("---------------下面开始猜诗---------------");
        step = 0; flag = 0;
        state = "play";
    } else if(state == "play") {
        step++;
        if(ipt == "0") { log("很遗憾，目标诗句是："+str); state="menu"; start(); return; }
        if(ipt == str) { log("恭喜你猜对了, 共猜测"+step+"次"); state="menu"; start(); return; }
        que = ipt; check(); printNow();
        if(step >= rod) { log("次数用完！目标诗句是："+str); state="menu"; start(); }
    }
}

function start() {
    log("\n==== 寻花令猜诗游戏 ====");
    log("本程序为寻花令劣质山寨版，规则与原版一致\n");
    log("tips:请务必不要输入逗号或句号\n");
	
    log("开始游戏请按 1 , 结束游戏请按 2");
    state = "menu";
}

window.onload = start;
</script>
